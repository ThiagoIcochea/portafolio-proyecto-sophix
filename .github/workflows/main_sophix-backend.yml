name: Build and deploy Node.js app to Azure Web App - sophix-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sophix-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sophix-backend/package-lock.json

      - name: Install ALL dependencies
        run: npm ci

      - name: Build NestJS application
        run: npm run build

      
      - name: Prepare production dependencies
        run: npm ci --omit=dev

      
      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sophix-backend
          path: sophix-backend/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sophix-backend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: sophix-backend
          package: .
