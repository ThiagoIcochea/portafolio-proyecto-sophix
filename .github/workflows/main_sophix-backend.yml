name: Build and deploy Node.js app to Azure Web App - sophix-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sophix-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sophix-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS app
        run: npm run build

    
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Install production dependencies in deploy folder
        run: |
          cd deploy
          npm ci --omit=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: sophix-backend/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

    
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E60E774A429C4B8DB669013F0193C8B0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B77D8812959740DFBD8A439FD64FD4C7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F6FF879C0B2F4D6C94E024310F2ACF32 }}

    
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: sophix-backend
          package: .
